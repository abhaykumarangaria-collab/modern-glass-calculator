<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Glass Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <div class="top-controls">
        <button class="icon-btn" onclick="toggleTheme()" title="Toggle Theme">🌓</button>
        <button class="icon-btn" onclick="toggleHistory()" title="History">📜</button>
    </div>

    <div id="history-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>History</h3>
            <button onclick="toggleHistory()" class="close-btn">&times;</button>
        </div>
        <ul id="history-list"></ul>
        <button onclick="clearHistory()" class="clear-history-btn">Clear All</button>
    </div>

    <div class="calculator">
        <div class="display">
            <div id="previous-operand"></div>
            <div id="current-operand">0</div>
        </div>

        <div class="buttons-grid">
            <button class="operator span-two" onclick="clearDisplay()">AC</button>
            <button class="operator" onclick="deleteNumber()">DEL</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('-')">-</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            
            <button onclick="appendNumber('0')" class="span-two">0</button>
            <button onclick="appendNumber('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
